{% extends "main/base.html" %}
{% load static %}

{% block content %}
    <div class="product-screen_bg">
        <div class="product-screen_image-div">
            <img class="product-screen_image" src="{{ product.image.url }}" alt="{{ product.name }}">
        </div>
        <div class="product-screen_information">
            <h2 class="product-screen_name">{{ product.name }}</h2>
            <p class="product-screen_id">id: {{ product.display_id }}</p>
            <p class="product_screen-rating">10\10</p>
            <p class="product_screen-description">{{ product.description }}</p>
            <p class="product_screen-price">{{ product.sell_price }} ₽</p>
            <a href="#" class="product_screen-add-to-cart decoration_none">Добавить в корзину</a>
        </div>
    </div>
{% endblock content %}
