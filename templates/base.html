{% load static %}
{% load goods_tags %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{% static "deps/css/index.css" %}">
</head>
<body>
    <header class="header_main">
        <!-- логотип в header -->
        <div class="wrapper inline_block">
            <a href="{% url "main:index" %}" class="header_title decoration_none">MO-ШОП</a>
        </div>
        <!-- каталог в header -->
        <div class="dropdown-menu">
            <button class="dropdown-menu_button" id="dropdown-menu_button" type="button">
                <p>Каталог</p>
                <img class="catalog_icon" src="{% static "deps/icons/grid-fill.svg" %}" alt="Catalog Icon" width="28"
                    height="28">
            </button>
            <ul class="dropdown-menu_list" id="dropdown-menu_list" style="display: none">
                {% tag_categories as categories %}
                {% for category in categories %}
                    <li><a class="dropdown-menu_item link_basic_style decoration_none" href="{% url "catalog:index" category.slug %}">{{ category.name }}</a></li>
                {% endfor %}
            </ul>
        </div>
        <!-- звёзды в header -->
        <div class="header_stars-bg"></div> 
        <!-- корзина в header -->
        <a href="{% if user.is_authenticated %}{% url "user:users_cart" %}{% else %}{% url "user:login" %}{% endif %}" class="display_flex">
            <img src="{% static "deps/icons/cart_header.svg" %}" class="header_cart-image" alt="header_cart-image" title="Корзина">
        </a>
        <!-- личный кабинет в header -->
        <a href="{% if user.is_authenticated %}{% url "user:profile" %}{% else %}{% url "user:login" %}{% endif %}" class="display_flex">
            <img src="{% static "deps/icons/account_icon.svg" %}" class="header_account-image" alt="header_account-image" title="Личный кабинет">
        </a>
    </header>

    <div class="page_content">
        {% include "includes/notifications.html" %}
        {% block content %}{% endblock content %}
    </div>

    <script src="{% static "deps/js/jquery/jquery-3.7.0.min.js" %}"></script>
    <script src="{% static "deps/js/jquery-events.js" %}"></script>
</body>
</html>
