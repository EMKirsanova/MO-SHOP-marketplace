{% extends "base.html" %}
{% load static %}

{% block content %}
    <div class="login_wrapper">
        <div class="login_panel">
            <h2 class="login_title">Авторизация</h2>
            <form class="login_form">
                <div class="login_form_role">
                    <label for="role-select" class="login_form_login-as registration_form-label">Войти как:</label>
                    <select class="login_form-control" id="role-select" name="role" required>
                        <option value="" disabled selected>Выберите роль</option>
                        <option value="customer">Покупатель</option>
                        <option value="seller">Продавец</option>
                        <option value="staff">Сотрудник</option>
                    </select>
                </div>
                <div class="login_inputs">
                    <input type="text" class="login_form-control" id="username" placeholder="Логин" required>
                    <input type="password" class="login_form-control" id="password" placeholder="Пароль" required>
                </div>
                <button type="submit" class="login_submit-btn login-btn">Войти</button>
            </form>
            <a class="login_create-new login-btn decoration_none" href="{% url "user:registration" %}">Регистрация</a>
        </div>
    </div>
{% endblock content %}
